apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: datastores.aws.platform.upbound.io
spec:
  group: aws.platform.upbound.io
  names:
    categories:
    - crossplane
    kind: DataStore
    plural: datastores
  scope: Namespaced
  versions:
  - name: v1alpha1
    served: true
    referenceable: true
    schema:
      openAPIV3Schema:
        type: object
        description: >-
          DataStore provisions a managed relational database. The provider
          implementation (e.g. RDS) and the instance sizing are L3 details, not
          leaked API surface — "CreateDatabase", not "CreateRDSInstance".
        properties:
          spec:
            type: object
            properties:
              parameters:
                type: object
                description: DataStore configuration parameters.
                properties:
                  region:
                    type: string
                    description: Cloud region, e.g. us-west-2.
                  engine:
                    type: string
                    enum: [postgres, mariadb]
                    description: >-
                      Database engine. The platform implements this in L3; adding
                      an engine (e.g. aurora-postgresql) is an additive enum value,
                      not a new API.
                  engineVersion:
                    type: string
                    description: Database engine version.
                  size:
                    type: string
                    enum: [small, medium, large]
                    default: small
                    description: >-
                      Capacity intent. The composition maps this to the current
                      right instance class (an L3 concern); consumers express a
                      size, never a provider instance class.
                  storageGB:
                    type: integer
                    description: Allocated storage in GiB.
                  reclaimPolicy:
                    type: string
                    enum: [Delete, Retain]
                    default: Delete
                    description: >-
                      Outcome intent (Kubernetes PersistentVolume vocabulary).
                      Retain leaves the database in place when this composite is
                      deleted. The mapping to Crossplane management policies is
                      owned by the composition; this field does not echo Crossplane
                      machinery.
                  networkRef:
                    type: object
                    description: >-
                      Reference, by platform id, to the Network this database is
                      placed in. Resolved in L3 (extra-resources) from the
                      Network's published status — private subnets + security group.
                    properties:
                      id:
                        type: string
                        description: Platform id of the Network (its metadata name).
                    required:
                    - id
                  passwordSecretRef:
                    type: object
                    description: Reference to the Secret holding the database password.
                    properties:
                      name:
                        type: string
                      key:
                        type: string
                    required:
                    - name
                    - key
                  autoGeneratePassword:
                    type: boolean
                    description: Whether to auto-generate the database password.
                  overrides:
                    type: object
                    description: >-
                      Bounded escape hatch with an explicit support boundary.
                    properties:
                      providerConfigName:
                        type: string
                        description: >-
                          Crossplane ProviderConfig for account/credential
                          selection. Defaults to "default".
                required:
                - region
                - engine
                - engineVersion
                - storageGB
                - networkRef
                - passwordSecretRef
            required:
            - parameters
          status:
            type: object
            description: DataStore status published for consumers / observability.
            properties:
              endpoint:
                type: string
                description: Connection endpoint (host:port).
              host:
                type: string
                description: Database host address.
        required:
        - spec
